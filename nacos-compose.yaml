services:
  nacos:
    image: nacos/nacos-server:${NACOS_VERSION}
    container_name: nacos-standalone-mysql
    env_file:
      - ./env/nacos-standalone-mysql.env
    volumes:
      - nacos-standalone-logs:/home/nacos/logs
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
    networks:
      - nacos-compose_network

  mysql:
    image: mysql:8.0.30
    env_file:
      - ./env/mysql.env
    container_name: mysql-nacos
    networks:
      - nacos-compose_network
    ports:
      - "3366:3306"
    volumes:
      - ./mysql-nacos:/var/lib/mysql

networks:
  nacos-compose_network:
    driver: bridge

volumes:
  nacos-standalone-logs:
  mysql-nacos: